<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>牙齿洁白提醒助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: #f0f4fa;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 20px 16px 60px;
            color: #1f2937;
        }

        .app-container { max-width: 600px; margin: 0 auto; }

        /* 头部 */
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2b6e9f, #1e4a6e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header p { font-size: 0.82rem; color: #5c6f87; margin-top: 6px; }

        /* 卡片 */
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.05);
            padding: 18px;
            margin-bottom: 18px;
            border: 1px solid #e8eef8;
        }

        /* 任务头 */
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .task-header h2 { font-size: 1.2rem; font-weight: 700; }
        .date-badge {
            font-size: 0.72rem;
            background: #eef3ff;
            padding: 4px 12px;
            border-radius: 40px;
            color: #1e5a8a;
            font-weight: 500;
        }

        /* 单条任务项 */
        .routine-item {
            background: #f6f9fd;
            border-radius: 18px;
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid #e8eef6;
        }
        .routine-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .routine-info { flex: 1; }
        .routine-info h3 {
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }
        .badge-tip {
            background: #e6f4ea;
            color: #2c6e3c;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: normal;
        }
        .desc { font-size: 0.72rem; color: #5a6e8a; line-height: 1.4; }

        /* 按钮组 */
        .btn-group { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        .btn-sm {
            border: 1.5px solid #cddae9;
            padding: 7px 14px;
            border-radius: 40px;
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
            background: white;
            color: #2c5f8a;
            white-space: nowrap;
        }
        .btn-sm.active {
            background: #2b6e9f;
            border-color: #2b6e9f;
            color: white;
            box-shadow: 0 2px 8px rgba(43,110,159,0.25);
        }

        /* 内嵌拍照区域 */
        .inline-photo-area {
            margin-top: 12px;
            display: none; /* 默认隐藏，点完成后展开 */
        }
        .inline-photo-area.visible { display: block; }

        .photo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .thumb-preview {
            width: 68px;
            height: 68px;
            border-radius: 14px;
            object-fit: cover;
            border: 1.5px solid #dde6f0;
            background: #eef2f8;
            flex-shrink: 0;
        }
        .photo-btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .capture-btn {
            background: #f0f5fb;
            border: 1.5px dashed #9aaebf;
            border-radius: 40px;
            padding: 7px 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            color: #2c5f8a;
            white-space: nowrap;
        }
        .capture-btn:active { background: #dde8f5; }

        .save-inline-btn {
            background: #2b6e9f;
            border: none;
            color: white;
            padding: 9px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            display: block;
            width: 100%;
            text-align: center;
            transition: 0.15s;
        }
        .save-inline-btn:active { background: #1e5a8a; transform: scale(0.98); }
        .save-inline-btn:disabled {
            background: #b0c4d8;
            cursor: not-allowed;
            transform: none;
        }

        .saved-hint {
            font-size: 0.7rem;
            color: #2c8a50;
            margin-top: 6px;
            display: none;
        }
        .saved-hint.show { display: block; }

        input[type="file"] { display: none; }

        /* 进度条 */
        .progress-tag {
            background: #eef2ff;
            border-radius: 20px;
            padding: 11px 16px;
            font-size: 0.75rem;
            color: #2c5f8a;
            margin-top: 4px;
            font-weight: 500;
        }

        /* 洁白相册卡片 */
        .gallery-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 2px;
        }
        .history-item {
            background: #fafbfd;
            border-radius: 18px;
            padding: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            border: 1px solid #edf2f7;
        }
        .history-img {
            width: 62px;
            height: 62px;
            border-radius: 14px;
            object-fit: cover;
            background: #eef2f8;
            flex-shrink: 0;
        }
        .history-info { flex: 1; min-width: 0; }
        .history-date { font-weight: 600; font-size: 0.78rem; }
        .history-note { font-size: 0.68rem; color: #6c7c98; margin-top: 3px; line-height: 1.4; }
        .delete-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            color: #b0bccf;
            cursor: pointer;
            padding: 6px;
            flex-shrink: 0;
        }
        .empty-state {
            text-align: center;
            padding: 32px 16px;
            color: #8c9bb0;
            font-size: 0.82rem;
        }

        .card-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .card-title-row h2 { font-size: 1.1rem; font-weight: 700; }
        .btn-outline {
            background: transparent;
            border: 1px solid #ccd8e4;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
            color: #5a6e8a;
        }

        footer {
            text-align: center;
            font-size: 0.68rem;
            color: #9aaebe;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            body { padding: 14px 12px 50px; }
            .routine-top { flex-direction: column; align-items: flex-start; }
            .btn-group { align-self: flex-end; }
        }
    </style>
</head>
<body>
<div class="app-container">

    <div class="header">
        <h1>🦷 洁白牙齿助手</h1>
        <p>坚持记录 · 见证亮白变化</p>
    </div>

    <!-- 今日任务卡片 -->
    <div class="card">
        <div class="task-header">
            <h2>📋 今日护理</h2>
            <div class="date-badge" id="currentDate"></div>
        </div>

        <!-- 晨间刷牙 -->
        <div class="routine-item" id="morningBrushItem">
            <div class="routine-top">
                <div class="routine-info">
                    <h3>🌅 晨间刷牙 <span class="badge-tip">≥2分钟 · 巴氏刷牙法</span></h3>
                    <div class="desc">牙刷45°角对准牙龈沟，小幅度震颤，电动牙刷更省力。</div>
                </div>
                <div class="btn-group">
                    <button class="btn-sm" data-task="morningBrush" data-status="done">✅ 完成</button>
                    <button class="btn-sm" data-task="morningBrush" data-status="pending">⏳ 未做</button>
                </div>
            </div>
            <!-- 内嵌拍照区 -->
            <div class="inline-photo-area" id="morningBrushPhotoArea">
                <div class="photo-row">
                    <img class="thumb-preview" id="morningBrushThumb" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23eef2f8'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' fill='%238a99b0' font-size='11'%3E待拍照%3C/text%3E%3C/svg%3E" alt="预览">
                    <div class="photo-btn-group">
                        <label class="capture-btn" for="morningBrushCamera">📷 拍摄</label>
                        <label class="capture-btn" for="morningBrushAlbum">🖼️ 相册</label>
                    </div>
                </div>
                <input type="file" id="morningBrushCamera" accept="image/*" capture="environment">
                <input type="file" id="morningBrushAlbum" accept="image/*">
                <button class="save-inline-btn" id="morningBrushSaveBtn" disabled>💾 保存晨刷记录</button>
                <div class="saved-hint" id="morningBrushSavedHint">✅ 已保存到洁白相册</div>
            </div>
        </div>

        <!-- 晚间刷牙 -->
        <div class="routine-item" id="eveningBrushItem">
            <div class="routine-top">
                <div class="routine-info">
                    <h3>🌙 晚间刷牙 <span class="badge-tip">≥2分钟 · 巴氏刷牙法</span></h3>
                    <div class="desc">仔细清洁每个牙面，搭配电动牙刷效果更佳。</div>
                </div>
                <div class="btn-group">
                    <button class="btn-sm" data-task="eveningBrush" data-status="done">✅ 完成</button>
                    <button class="btn-sm" data-task="eveningBrush" data-status="pending">⏳ 未做</button>
                </div>
            </div>
            <div class="inline-photo-area" id="eveningBrushPhotoArea">
                <div class="photo-row">
                    <img class="thumb-preview" id="eveningBrushThumb" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23eef2f8'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' fill='%238a99b0' font-size='11'%3E待拍照%3C/text%3E%3C/svg%3E" alt="预览">
                    <div class="photo-btn-group">
                        <label class="capture-btn" for="eveningBrushCamera">📷 拍摄</label>
                        <label class="capture-btn" for="eveningBrushAlbum">🖼️ 相册</label>
                    </div>
                </div>
                <input type="file" id="eveningBrushCamera" accept="image/*" capture="environment">
                <input type="file" id="eveningBrushAlbum" accept="image/*">
                <button class="save-inline-btn" id="eveningBrushSaveBtn" disabled>💾 保存晚刷记录</button>
                <div class="saved-hint" id="eveningBrushSavedHint">✅ 已保存到洁白相册</div>
            </div>
        </div>

        <!-- 其他时间段刷牙 -->
        <div class="routine-item" id="otherBrushItem">
            <div class="routine-top">
                <div class="routine-info">
                    <h3>☀️ 其他时间段刷牙 <span class="badge-tip">午后或任意时间</span></h3>
                    <div class="desc">饭后30分钟刷牙效果最佳，记录每一次额外的清洁努力。</div>
                </div>
                <div class="btn-group">
                    <button class="btn-sm" data-task="otherBrush" data-status="done">✅ 完成</button>
                    <button class="btn-sm" data-task="otherBrush" data-status="pending">⏳ 未做</button>
                </div>
            </div>
            <div class="inline-photo-area" id="otherBrushPhotoArea">
                <div class="photo-row">
                    <img class="thumb-preview" id="otherBrushThumb" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23eef2f8'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' fill='%238a99b0' font-size='11'%3E待拍照%3C/text%3E%3C/svg%3E" alt="预览">
                    <div class="photo-btn-group">
                        <label class="capture-btn" for="otherBrushCamera">📷 拍摄</label>
                        <label class="capture-btn" for="otherBrushAlbum">🖼️ 相册</label>
                    </div>
                </div>
                <input type="file" id="otherBrushCamera" accept="image/*" capture="environment">
                <input type="file" id="otherBrushAlbum" accept="image/*">
                <button class="save-inline-btn" id="otherBrushSaveBtn" disabled>💾 保存记录</button>
                <div class="saved-hint" id="otherBrushSavedHint">✅ 已保存到洁白相册</div>
            </div>
        </div>

        <div class="progress-tag" id="dailyProgressMsg">📌 今日进度：待完成</div>
    </div>

    <!-- 洁白相册卡片 -->
    <div class="card">
        <div class="card-title-row">
            <h2>📅 洁白相册</h2>
            <button id="clearAllHistoryBtn" class="btn-outline">清空全部</button>
        </div>
        <div id="historyGalleryContainer">
            <div class="empty-state">📷 暂无洁牙影像记录，完成清洁后拍照保存吧~</div>
        </div>
    </div>

    <footer>✨ 巴氏刷牙法 · 每日打卡见证改变</footer>
</div>

<script>
    const STORAGE_TASKS  = 'teeth_v2_daily_tasks';
    const STORAGE_PHOTOS = 'teeth_v2_photos';

    // ---- 工具 ----
    function getTodayStr() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function getTodayTasks() {
        const today = getTodayStr();
        const all = JSON.parse(localStorage.getItem(STORAGE_TASKS) || '{}');
        if (!all[today]) all[today] = { morningBrush: false, eveningBrush: false, otherBrush: false };
        return all[today];
    }

    function saveTodayTask(key, val) {
        const today = getTodayStr();
        const all = JSON.parse(localStorage.getItem(STORAGE_TASKS) || '{}');
        if (!all[today]) all[today] = { morningBrush: false, eveningBrush: false, otherBrush: false };
        all[today][key] = val;
        localStorage.setItem(STORAGE_TASKS, JSON.stringify(all));
    }

    // ---- 每条任务的配置 ----
    const TASK_CONFIG = [
        {
            key: 'morningBrush',
            label: '晨间刷牙',
            itemId: 'morningBrushItem',
            photoAreaId: 'morningBrushPhotoArea',
            thumbId: 'morningBrushThumb',
            cameraInputId: 'morningBrushCamera',
            albumInputId: 'morningBrushAlbum',
            saveBtnId: 'morningBrushSaveBtn',
            hintId: 'morningBrushSavedHint',
        },
        {
            key: 'eveningBrush',
            label: '晚间刷牙',
            itemId: 'eveningBrushItem',
            photoAreaId: 'eveningBrushPhotoArea',
            thumbId: 'eveningBrushThumb',
            cameraInputId: 'eveningBrushCamera',
            albumInputId: 'eveningBrushAlbum',
            saveBtnId: 'eveningBrushSaveBtn',
            hintId: 'eveningBrushSavedHint',
        },
        {
            key: 'otherBrush',
            label: '其他时间段刷牙',
            itemId: 'otherBrushItem',
            photoAreaId: 'otherBrushPhotoArea',
            thumbId: 'otherBrushThumb',
            cameraInputId: 'otherBrushCamera',
            albumInputId: 'otherBrushAlbum',
            saveBtnId: 'otherBrushSaveBtn',
            hintId: 'otherBrushSavedHint',
        },
    ];

    // 每个任务的临时图片暂存
    const pendingImages = { morningBrush: null, eveningBrush: null, otherBrush: null };

    // ---- 初始化每条任务的交互 ----
    function initTaskItem(cfg) {
        const item      = document.getElementById(cfg.itemId);
        const photoArea = document.getElementById(cfg.photoAreaId);
        const thumb     = document.getElementById(cfg.thumbId);
        const cameraInput = document.getElementById(cfg.cameraInputId);
        const albumInput  = document.getElementById(cfg.albumInputId);
        const saveBtn   = document.getElementById(cfg.saveBtnId);
        const hint      = document.getElementById(cfg.hintId);

        const doneBtn    = item.querySelector(`.btn-sm[data-status="done"]`);
        const pendingBtn = item.querySelector(`.btn-sm[data-status="pending"]`);

        // 完成/未做按钮
        doneBtn.addEventListener('click', () => {
            saveTodayTask(cfg.key, true);
            doneBtn.classList.add('active');
            pendingBtn.classList.remove('active');
            photoArea.classList.add('visible');   // 展开拍照区
            updateProgressMessage();
            showToast(cfg.key);
        });
        pendingBtn.addEventListener('click', () => {
            saveTodayTask(cfg.key, false);
            pendingBtn.classList.add('active');
            doneBtn.classList.remove('active');
            photoArea.classList.remove('visible'); // 收起拍照区
            updateProgressMessage();
        });

        // 处理图片选择（拍摄 & 相册共用同一个处理函数）
        function handleFileSelect(input) {
            input.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    pendingImages[cfg.key] = ev.target.result;
                    thumb.src = ev.target.result;
                    saveBtn.disabled = false;
                    hint.classList.remove('show'); // 重置提示
                };
                reader.readAsDataURL(file);
                input.value = ''; // 允许重复选同一张
            });
        }
        handleFileSelect(cameraInput);
        handleFileSelect(albumInput);

        // 保存按钮 —— 防重复点击
        let isSaving = false;
        saveBtn.addEventListener('click', () => {
            if (isSaving) return;
            const imgData = pendingImages[cfg.key];
            if (!imgData) {
                alert('请先拍摄或从相册选择一张照片～');
                return;
            }
            isSaving = true;
            saveBtn.disabled = true;
            saveBtn.textContent = '保存中...';

            try {
                savePhotoRecord(cfg.key, cfg.label, imgData);
                pendingImages[cfg.key] = null;
                // 重置缩略图
                thumb.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23eef2f8'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' fill='%238a99b0' font-size='11'%3E待拍照%3C/text%3E%3C/svg%3E";
                saveBtn.textContent = `💾 保存${cfg.label === '其他时间段刷牙' ? '' : cfg.label.slice(2)}记录`;
                hint.classList.add('show');
                renderHistoryGallery();
            } catch(err) {
                alert('保存失败，请重试');
                saveBtn.disabled = false;
                saveBtn.textContent = `💾 保存${cfg.label === '其他时间段刷牙' ? '' : cfg.label.slice(2)}记录`;
            }
            isSaving = false;
        });
    }

    // ---- 保存照片到 localStorage ----
    function savePhotoRecord(taskKey, taskLabel, imgData) {
        const todayStr = getTodayStr();
        const tasks = getTodayTasks();
        const snap = [
            tasks.morningBrush ? '✅晨刷' : '❌晨刷',
            tasks.eveningBrush ? '✅晚刷' : '❌晚刷',
            tasks.otherBrush   ? '✅其他时段' : '❌其他时段',
        ].join(' · ');

        const record = {
            id: `${Date.now()}_${Math.random().toString(36).substr(2,5)}`,
            timestamp: new Date().toISOString(),
            dateStr: todayStr,
            taskKey,
            taskLabel,
            imageDataUrl: imgData,
            taskSnapshot: snap,
        };

        let photos = JSON.parse(localStorage.getItem(STORAGE_PHOTOS) || '[]');
        photos.unshift(record);
        if (photos.length > 60) photos = photos.slice(0, 60);
        localStorage.setItem(STORAGE_PHOTOS, JSON.stringify(photos));
    }

    // ---- 渲染洁白相册 ----
    function renderHistoryGallery() {
        const container = document.getElementById('historyGalleryContainer');
        const photos = JSON.parse(localStorage.getItem(STORAGE_PHOTOS) || '[]');

        if (!photos.length) {
            container.innerHTML = `<div class="empty-state">📷 暂无洁牙影像记录，完成清洁后拍照保存吧~</div>`;
            return;
        }

        let html = `<div class="gallery-grid">`;
        photos.forEach(p => {
            const timeLabel = p.timestamp
                ? new Date(p.timestamp).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })
                : p.dateStr;
            html += `
                <div class="history-item">
                    <img class="history-img" src="${p.imageDataUrl}" alt="牙齿记录">
                    <div class="history-info">
                        <div class="history-date">📅 ${p.dateStr} ${timeLabel} · ${p.taskLabel || ''}</div>
                        <div class="history-note">🧾 ${p.taskSnapshot || '无快照'}</div>
                    </div>
                    <button class="delete-btn" data-id="${p.id}" title="删除">🗑️</button>
                </div>`;
        });
        html += `</div>`;
        container.innerHTML = html;

        container.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!confirm('删除这张照片记录？')) return;
                let ps = JSON.parse(localStorage.getItem(STORAGE_PHOTOS) || '[]');
                ps = ps.filter(p => p.id !== btn.dataset.id);
                localStorage.setItem(STORAGE_PHOTOS, JSON.stringify(ps));
                renderHistoryGallery();
            });
        });
    }

    // ---- 进度消息 ----
    function updateProgressMessage() {
        const tasks = getTodayTasks();
        const count = [tasks.morningBrush, tasks.eveningBrush, tasks.otherBrush].filter(Boolean).length;
        const msg = document.getElementById('dailyProgressMsg');
        if (count === 3) {
            msg.innerHTML = '🎉 太棒了！今日三项护理全部完成！继续保持洁白笑容 🎉';
            msg.style.background = '#e0f2e9';
            msg.style.color = '#1e6e3c';
        } else {
            msg.innerHTML = `📌 今日已完成 ${count}/3 项护理，继续加油～`;
            msg.style.background = '#eef2ff';
            msg.style.color = '#2c5f8a';
        }
    }

    // ---- 渲染任务按钮初始状态 ----
    function renderTaskStates() {
        const tasks = getTodayTasks();
        TASK_CONFIG.forEach(cfg => {
            const item = document.getElementById(cfg.itemId);
            const photoArea = document.getElementById(cfg.photoAreaId);
            const doneBtn = item.querySelector(`.btn-sm[data-status="done"]`);
            const pendingBtn = item.querySelector(`.btn-sm[data-status="pending"]`);
            const isDone = tasks[cfg.key];
            if (isDone) {
                doneBtn.classList.add('active');
                pendingBtn.classList.remove('active');
                photoArea.classList.add('visible');
            } else {
                pendingBtn.classList.add('active');
                doneBtn.classList.remove('active');
                photoArea.classList.remove('visible');
            }
        });
    }

    // ---- Toast 提示 ----
    function showToast(taskKey) {
        const msgs = {
            morningBrush: '🪥 晨刷提醒：45°角对准牙龈沟，小幅震颤，至少2分钟！',
            eveningBrush: '🌙 晚刷提醒：认真清洁每个牙面，睡前刷牙最关键！',
            otherBrush:   '☀️ 坚持额外刷牙，牙齿更洁白健康！',
        };
        const toast = document.createElement('div');
        toast.innerText = msgs[taskKey] || '✅ 已记录！';
        Object.assign(toast.style, {
            position: 'fixed', bottom: '24px', left: '16px', right: '16px',
            background: '#1e4a6e', color: 'white', padding: '12px 16px',
            borderRadius: '50px', textAlign: 'center', fontSize: '0.78rem',
            zIndex: '9999', boxShadow: '0 4px 16px rgba(0,0,0,0.2)',
            transition: 'opacity 0.3s',
        });
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2800);
    }

    // ---- 日期显示 ----
    function setDateDisplay() {
        const d = new Date();
        const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
        document.getElementById('currentDate').innerText =
            `${getTodayStr()} ${weekdays[d.getDay()]}`;
    }

    // ---- 清空相册 ----
    document.getElementById('clearAllHistoryBtn').addEventListener('click', () => {
        if (!confirm('⚠️ 确定清空所有洁白相册记录吗？不可撤销。')) return;
        localStorage.setItem(STORAGE_PHOTOS, '[]');
        renderHistoryGallery();
    });

    // ---- 启动 ----
    function init() {
        setDateDisplay();
        TASK_CONFIG.forEach(initTaskItem);
        renderTaskStates();
        updateProgressMessage();
        renderHistoryGallery();
    }

    init();
</script>
</body>
</html>
